version: '3.8'

services:
  anna-sync:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=info
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - anna-network

networks:
  anna-network:
    driver: bridge

volumes:
  data:
