name: Deployment

on:
  push:
    branches:
      - testing
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        options:
          - testing
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy-testing:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/testing') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testing' && github.ref == 'refs/heads/testing')
    runs-on: ubuntu-latest
    environment:
      name: testing
      url: https://a.nn.xn--3ca.at
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Testing
        run: echo "Deploying to Testing (a.nn.ã.at)"

  deploy-staging:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/staging') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' && github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://e.nn.xn--3ca.at
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Staging
        run: echo "Deploying to Staging (e.nn.ã.at)"

  deploy-production:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nn.xn--3ca.at
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Production
        run: echo "Deploying to Production (nn.ã.at)"
