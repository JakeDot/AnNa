name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.4.5)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-server:
    name: Build Server (Rust)
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075fab17578c3545ca9a9
        with:
          workspaces: server

      - name: Build server (release)
        run: |
          cd server
          cargo build --release --target ${{ matrix.target }}

      - name: Upload server artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35eaed151
        with:
          name: anna-sync-server-${{ matrix.target }}
          path: server/target/${{ matrix.target }}/release/anna-sync-server.exe
          retention-days: 7

  build-client:
    name: Build Client (React/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178fac353787148b374f1991b
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Build client
        run: |
          cd client
          npm run build

      - name: Upload client artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35eaed151
        with:
          name: anna-sync-client-dist
          path: client/dist/
          retention-days: 7

  create-release:
    name: Create Release
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Download server artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: anna-sync-server-x86_64-pc-windows-msvc
          path: ./release-artifacts/

      - name: Download client artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: anna-sync-client-dist
          path: ./release-artifacts/client-dist/

      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: |
            release-artifacts/anna-sync-server.exe
          body: |
            # AnNa Sync v${{ github.event.inputs.version }}

            ## Artifacts
            - **Server (Windows x64)**: anna-sync-server.exe
            - **Client**: Compiled React/TypeScript bundle (dist/)

            ## Changes
            See commit history for detailed changes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
